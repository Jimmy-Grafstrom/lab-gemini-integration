<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="chat-container">
    <h1>Gemini AI Integration</h1>

    <form th:action="@{/submit-prompt}" th:object="${promptDto}" method="post">
        <div class="form-group">
            <label for="prompt">Ställ en fråga till Gemini</label>
            <textarea id="prompt" th:field="*{prompt}" placeholder="Vad kan jag hjälpa dig med idag?"></textarea>
            <div class="error" th:if="${#fields.hasErrors('prompt')}" th:errors="*{prompt}">Felmeddelande</div>
        </div>
        <button type="submit">Skicka fråga</button>
    </form>

    <div class="history" th:if="${not #lists.isEmpty(prompts)}">
        <h2>Tidigare konversationer</h2>
        <div th:each="p : ${prompts}" class="chat-item">
            <div class="user-prompt">
                <span>Fråga</span>
                <span th:text="${p.prompt}">Din fråga...</span>
            </div>
            <div class="ai-response" th:text="${p.response}">
                Svar från Gemini...
            </div>
        </div>
    </div>
</div>

</body>
</html>
